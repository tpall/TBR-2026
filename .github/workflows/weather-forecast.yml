name: TBR 2026 weather forecast

on:
  schedule:
    # 04:00 UTC daily = 06:00 CEST (Estonia winter / 07:00 EEST summer)
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    paths:
      - weather_forecast.R
      - .github/workflows/weather-forecast.yml

permissions:
  contents: write

concurrency:
  group: weather-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # actions/checkout is required so the daily commit lands on the repo,
      # which also keeps the schedule alive (GitHub disables crons after 60d
      # of repo inactivity — daily commits prevent that).
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Setup R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            httr2
            jsonlite

      - name: Generate weather forecast
        run: Rscript weather_forecast.R

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather_forecast.md weather_forecast.json
          if git diff --cached --quiet; then
            echo "No forecast changes to commit."
          else
            git commit -m "chore(weather): forecast update $(date -u +%Y-%m-%d)"
            git push
          fi
